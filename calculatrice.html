<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculatrice - RentMaster</title>

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f9ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
/* TOPBAR CALCULATRICE */
.topbar-calc{
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.topbar-calc h2{
    color: #2563eb;
}
/* CONTAINER */
.calculator {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 320px;
}

/* DISPLAY */
.display {
    width: 100%;
    height: 60px;
    border-radius: 10px;
    border: 2px solid #3498db;
    text-align: right;
    font-size: 24px;
    padding: 10px;
    margin-bottom: 15px;
}

.btn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;}
.btn-primary{background:#2563eb;color:#fff;}
.btn-ghost{background:#fff;border:1px solid #ddd;color:#2563eb;}
/* BUTTON GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    border-radius: 12px;
    border: 2px solid #3498db;
    background: #ecf5ff;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

button i {
    font-size: 18px;
}

button:hover {
    background: #3498db;
    color: white;
}

/* EQUAL */
.equal {
    grid-column: span 2;
    background: #3498db;
    color: white;
}

/* CLEAR */
.clear {
    background: #ffecec;
    border-color: #e74c3c;
}

.clear:hover {
    background: #e74c3c;
    color: white;
}

</style>
</head>

<body>
<div class="topbar-calc">
    <button class="btn btn-ghost" onclick="window.location='dashboard.html'">
        <i class="fas fa-arrow-left"></i> Retour
    </button>
    <h2>Calculatrice</h2>
</div>
<div class="calculator">

    <input type="text" id="display" class="display" disabled>

    <div class="buttons">

        <button onclick="clearDisplay()" class="clear">
            <i class="fas fa-trash"></i>
        </button>

        <button onclick="append('/')">
            <i class="fas fa-divide"></i>
        </button>

        <button onclick="append('*')">
            <i class="fas fa-times"></i>
        </button>

        <button onclick="append('-')">
            <i class="fas fa-minus"></i>
        </button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>

        <button onclick="append('+')">
            <i class="fas fa-plus"></i>
        </button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>

        <button onclick="calculate()" class="equal">
            <i class="fas fa-equals"></i>
        </button>

    </div>

</div>

<script>

let display = document.getElementById("display");

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Erreur";
    }
}

</script>

</body>
</html>
