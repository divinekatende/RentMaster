<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Paiements - RentMaster</title>
<link rel="stylesheet" href="bien.css">

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 20px;
    background-image: url('fond3.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: #1b263b;
}

/* petit plus UX */
#conversion {
  background: rgba(255,255,255,0.8);
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Gestion des Paiements</h1>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="bien.html">Biens</a>
  <a href="locataire.html">Locataires</a>
  <a href="contrat.html">Contrats</a>
  <a href="paiement.html">Paiements</a>
</nav>

<button onclick="openForm()">+ Ajouter un paiement</button>

<table id="tablePaiements">
<thead>
<tr>
<th>ID</th>
<th>Locataire</th>
<th>Bien</th>
<th>Montant</th>
<th>Date</th>
<th>Mode</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- FORMULAIRE -->
<div id="formPaiement" style="display:none;">
<h2 id="formTitle">Ajouter un paiement</h2>

<label>Contrat :</label>
<select id="contratSelect"></select><br>

<label>Montant :</label>
<input type="number" id="montant" min="0" oninput="convertir()"><br>

<label>Devise :</label>
<select id="devise" onchange="convertir()">
  <option value="USD">Dollar ($)</option>
  <option value="CDF">Franc Congolais (FC)</option>
</select><br>

<label>Taux :</label>
<input type="number" id="taux" value="2500" onchange="convertir()"><br>

<div id="conversion">Montant en USD : 0 $</div>

<label>Date paiement :</label>
<input type="date" id="datePaiement"><br>

<label>Date échéance :</label>
<input type="date" id="dateEcheance"><br>

<label>Mode :</label>
<select id="mode">
  <option>Espèces</option>
  <option>Virement</option>
  <option>Mobile Money</option>
</select><br>

<button id="btnAjouter" onclick="ajouterPaiement()">Ajouter</button>
<button onclick="annulerForm()">Annuler</button>
</div>

<script>
let contrats = JSON.parse(localStorage.getItem("contrats")) || [];
let paiements = JSON.parse(localStorage.getItem("paiements")) || [];
let biens = JSON.parse(localStorage.getItem("biens")) || [];
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let editIndex = -1;

/* 🔹 remplir contrats */
function remplirContrats() {
  const select = document.getElementById('contratSelect');
  select.innerHTML = "";

  contrats.forEach(c => {
    const locataire = locataires.find(l => l.id == c.locataireId);
    const bien = biens.find(b => b.id == c.bienId);

    let nomLoc = locataire ? locataire.nom + " " + locataire.prenom : "Supprimé";
    let nomBien = bien ? bien.nom : "Supprimé";

    select.innerHTML += `<option value="${c.id}">${nomLoc} - ${nomBien}</option>`;
  });
}

/* 🔹 conversion */
function convertir(){
  let montant = parseFloat(document.getElementById("montant").value) || 0;
  let devise = document.getElementById("devise").value;
  let taux = parseFloat(document.getElementById("taux").value) || 1;

  let usd = devise === "CDF" ? montant / taux : montant;

  document.getElementById("conversion").innerText =
    "Montant en USD : " + usd.toFixed(2) + " $";
}

/* 🔹 afficher */
function afficherPaiements() {
  remplirContrats();

  const table = document.querySelector('#tablePaiements tbody');
  table.innerHTML = "";

  paiements.forEach((p,index) => {
    const contrat = contrats.find(c => c.id == p.contratId);
    const loc = contrat ? locataires.find(l => l.id == contrat.locataireId)?.nom : "Supprimé";
    const bien = contrat ? biens.find(b => b.id == contrat.bienId)?.nom : "Supprimé";

    const row = table.insertRow();
    row.insertCell(0).innerText = p.id;
    row.insertCell(1).innerText = loc;
    row.insertCell(2).innerText = bien;
    row.insertCell(3).innerText = p.montant + " " + (p.devise || "USD");
    row.insertCell(4).innerText = p.date;
    row.insertCell(5).innerText = p.mode;

    const statutCell = row.insertCell(6);
    statutCell.innerText = p.statut;

    if(p.statut === "Payé") statutCell.style.color = "green";
    else if(p.statut === "En retard") statutCell.style.color = "red";
    else statutCell.style.color = "orange";

    const actionsCell = row.insertCell(7);
    actionsCell.innerHTML = `
      <button onclick="modifierPaiement(${index})">Modifier</button>
      <button onclick="supprimerPaiement(${index})">Supprimer</button>
    `;
  });
}

/* 🔹 ajouter */
function ajouterPaiement() {
  const contratId = document.getElementById('contratSelect').value;
  const montant = parseFloat(document.getElementById('montant').value);
  const date = document.getElementById('datePaiement').value;
  const mode = document.getElementById('mode').value;

  const devise = document.getElementById('devise').value;
  const taux = parseFloat(document.getElementById('taux').value);
  const dateEcheance = document.getElementById('dateEcheance').value;

  if(!contratId || !montant || !date){
    alert("Remplis tous les champs !");
    return;
  }

  let montantUSD = devise === "CDF" ? montant / taux : montant;

  let statut = "Payé";
  let today = new Date();
  let echeance = new Date(dateEcheance);

  if(!date){
    statut = "En attente";
  } else if(today > echeance){
    statut = "En retard";
  }

  if(editIndex >=0){
    paiements[editIndex] = {
      ...paiements[editIndex],
      contratId, montant, date, mode,
      devise, montantUSD, statut, dateEcheance
    };
    editIndex = -1;
  } else {
    paiements.push({
      id: paiements.length + 1,
      contratId,
      montant,
      devise,
      montantUSD,
      date,
      mode,
      statut,
      dateEcheance
    });
  }

  localStorage.setItem("paiements", JSON.stringify(paiements));

  alert("Paiement enregistré avec succès ✅");

  afficherPaiements();
  annulerForm();
}

/* 🔹 modifier */
function modifierPaiement(index){
  editIndex = index;
  const p = paiements[index];

  document.getElementById('contratSelect').value = p.contratId;
  document.getElementById('montant').value = p.montant;
  document.getElementById('datePaiement').value = p.date;
  document.getElementById('mode').value = p.mode;
  document.getElementById('devise').value = p.devise;
  document.getElementById('dateEcheance').value = p.dateEcheance;

  document.getElementById('formTitle').innerText = "Modifier un paiement";
  document.getElementById('btnAjouter').innerText = "Enregistrer";

  openForm();
}

/* 🔹 supprimer */
function supprimerPaiement(index){
  if(confirm("Supprimer ce paiement ?")){
    paiements.splice(index,1);
    localStorage.setItem("paiements", JSON.stringify(paiements));
    afficherPaiements();
  }
}

/* 🔹 UI */
function openForm(){
  document.getElementById('formPaiement').style.display='block';
  document.getElementById('formPaiement').scrollIntoView({behavior:"smooth"});
}

function annulerForm(){
  document.getElementById('formPaiement').style.display='none';
  document.getElementById('montant').value='';
  document.getElementById('datePaiement').value='';
  document.getElementById('dateEcheance').value='';
  editIndex=-1;

  document.getElementById('btnAjouter').innerText="Ajouter";
  document.getElementById('formTitle').innerText="Ajouter un paiement";
}

/* INIT */
afficherPaiements();
</script>

</body>
</html>
