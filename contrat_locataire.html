<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Contrat</title>
<style>
/* --- Font et reset --- */
@import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

body {
    min-height:100vh;
    overflow-x:hidden;
    background: linear-gradient(160deg, #0a1d3f, #1b3a70, #345fd1);
    color:#f0f8ff;
    position:relative;
}

/* --- Blobs animés --- */
.blob {
    position:absolute;
    border-radius:50%;
    opacity:0.5;
    filter: blur(120px);
    animation: moveBlob 20s infinite alternate;
}
.blob1 { width:400px; height:400px; background:#1b3a70; top:-100px; left:-100px; }
.blob2 { width:300px; height:300px; background:#345fd1; top:200px; right:-150px; animation-duration:25s; }
.blob3 { width:500px; height:500px; background:#0a1d3f; bottom:-200px; left:50px; animation-duration:30s; }

@keyframes moveBlob {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(50px,-30px) scale(1.1); }
    100% { transform: translate(-50px,30px) scale(0.9); }
}

/* --- Header --- */
header {
    display:flex;
    align-items:center;
    padding:15px 20px;
    background: rgba(0,0,0,0.5);
    border-bottom:2px solid #5dade2;
    position:relative;
    z-index:2;
}
header img { height:50px; margin-right:15px; }
header h2 { color:#f0f8ff; }

/* --- Navigation --- */
nav {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    background: rgba(0,0,0,0.4);
    padding:10px 0;
    border-bottom:2px solid #5dade2;
    position:relative;
    z-index:2;
}
nav a {
    margin:5px 10px;
    text-decoration:none;
    color:#f0f8ff;
    font-weight:600;
    padding:5px 12px;
    border-radius:6px;
    transition:0.3s;
}
nav a:hover { background: rgba(93,173,226,0.5); }

/* --- Container --- */
.container {
    width:90%;
    max-width:500px;
    margin:30px auto;
    background: rgba(0,0,0,0.6);
    padding:25px;
    border-radius:15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    position:relative;
    z-index:2;
}
.card {
    padding:15px;
    border-radius:10px;
    background: rgba(255,255,255,0.1);
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.2);
}
.card p { margin:8px 0; color:#f0f8ff; }

/* --- Responsive --- */
@media(max-width:600px){
    .container { padding:20px; }
    nav a { margin:3px 5px; padding:4px 8px; }
}
</style>
</head>
<body>

<!-- Blobs animés -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<header>
  <img src="logo.png" alt="Logo">
  <h2>Mon Contrat</h2>
</header>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Mon contrat</a>
  <a href="paiement_locataire.html">Paiement</a>
  <a href="historique.html">Historique</a>
  <a href="profil_locataire.html">Profil</a>
</nav>

<div class="container" id="contratContainer"></div>

<script src="init.js"></script>
<script>
// sécurité
if(localStorage.getItem("connecte") !== "true"){ window.location.href="login.html"; }
let locataires = JSON.parse(localStorage.getItem("locataires"));
let userId = localStorage.getItem("userId");
let locataire = locataires.find(l => l.id == userId);

if(!localStorage.getItem("contrats")){
    let contrats = [
        {id:1, locataireId:1, bien:"Appartement A", bailleur:"Mr Dupont", montant:500, dateDebut:"01/01/2026", dateFin:"31/12/2026"},
        {id:2, locataireId:2, bien:"Appartement B", bailleur:"Mme Martin", montant:450, dateDebut:"01/02/2026", dateFin:"31/01/2027"}
    ];
    localStorage.setItem("contrats", JSON.stringify(contrats));
}

let contrats = JSON.parse(localStorage.getItem("contrats"));
let contrat = contrats.find(c => c.locataireId == locataire.id);

let container = document.getElementById("contratContainer");
if(contrat){
    container.innerHTML = `
        <div class="card">
            <p><strong>Bien:</strong> ${contrat.bien}</p>
            <p><strong>Bailleur:</strong> ${contrat.bailleur}</p>
            <p><strong>Montant:</strong> ${contrat.montant}$</p>
            <p><strong>Date début:</strong> ${contrat.dateDebut}</p>
            <p><strong>Date fin:</strong> ${contrat.dateFin}</p>
        </div>`;
}else{
    container.innerHTML = "<p>Aucun contrat trouvé.</p>";
}
</script>

</body>
</html>
