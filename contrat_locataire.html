<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Contrat</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#2c3e50; color:white; padding:15px; text-align:center; }
nav a { margin-right:10px; text-decoration:none; color:#34495e; }
.container { width:300px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
.card { padding:15px; border-radius:10px; background:#ecf0f1; margin-bottom:10px; }
</style>
</head>
<body>

<header>
  <h2>Mon Contrat</h2>
</header>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Mon contrat</a>
  <a href="paiement_locataire.html">Paiement</a>
  <a href="historique.html">Historique</a>
  <a href="profil_locataire.html">Profil</a>
</nav>

<div class="container" id="contratContainer"></div>

<script src="init.js"></script>
<script>
// sécurité
if(localStorage.getItem("connecte") !== "true"){
    window.location.href="login.html";
}

// récupérer locataire
let locataires = JSON.parse(localStorage.getItem("locataires"));
let userId = localStorage.getItem("userId");
let locataire = locataires.find(l => l.id == userId);

// initialisation des contrats si inexistants
if(!localStorage.getItem("contrats")){
    let contrats = [
        {id:1, locataireId:1, bien:"Appartement A", bailleur:"Mr Dupont", montant:500, dateDebut:"01/01/2026", dateFin:"31/12/2026"},
        {id:2, locataireId:2, bien:"Appartement B", bailleur:"Mme Martin", montant:450, dateDebut:"01/02/2026", dateFin:"31/01/2027"}
    ];
    localStorage.setItem("contrats", JSON.stringify(contrats));
}

let contrats = JSON.parse(localStorage.getItem("contrats"));
let contrat = contrats.find(c => c.locataireId == locataire.id);

let container = document.getElementById("contratContainer");
if(contrat){
    container.innerHTML = `
        <div class="card">
            <p><strong>Bien:</strong> ${contrat.bien}</p>
            <p><strong>Bailleur:</strong> ${contrat.bailleur}</p>
            <p><strong>Montant:</strong> ${contrat.montant}$</p>
            <p><strong>Date début:</strong> ${contrat.dateDebut}</p>
            <p><strong>Date fin:</strong> ${contrat.dateFin}</p>
        </div>
    `;
}else{
    container.innerHTML = "<p>Aucun contrat trouvé.</p>";
}
</script>

</body>
</html>
