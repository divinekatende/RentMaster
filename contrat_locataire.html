<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Contrat</title>

<!-- FONT -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height:100vh;
  overflow-x:hidden;
  background: linear-gradient(160deg, #0a1d3f, #1b3a70, #345fd1);
  color:#f0f8ff;
  position:relative;
}

/* BLOBS */
.blob {
  position:absolute;
  border-radius:50%;
  opacity:0.5;
  filter: blur(120px);
  animation: moveBlob 20s infinite alternate;
}
.blob1 { width:400px; height:400px; background:#1b3a70; top:-100px; left:-100px; }
.blob2 { width:300px; height:300px; background:#345fd1; top:200px; right:-150px; animation-duration:25s; }
.blob3 { width:500px; height:500px; background:#0a1d3f; bottom:-200px; left:50px; animation-duration:30s; }

@keyframes moveBlob {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(50px,-30px) scale(1.1); }
  100% { transform: translate(-50px,30px) scale(0.9); }
}

/* HEADER */
header {
  display:flex;
  align-items:center;
  padding:15px 20px;
  background: rgba(0,0,0,0.5);
  border-bottom:2px solid #5dade2;
  position:relative;
  z-index:2;
}
header img { height:50px; margin-right:15px; }
header h2 { color:#f0f8ff; }

/* NAV */
nav {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  background: rgba(0,0,0,0.4);
  padding:10px 0;
  border-bottom:2px solid #5dade2;
  position:relative;
  z-index:2;
}
nav a {
  margin:5px 10px;
  text-decoration:none;
  color:#f0f8ff;
  font-weight:600;
  padding:5px 12px;
  border-radius:6px;
  transition:0.3s;
}
nav a:hover { background: rgba(93,173,226,0.5); }

/* CONTAINER */
.container {
  width:90%;
  max-width:500px;
  margin:30px auto;
  position:relative;
  z-index:2;
}

/* CARD */
.card {
  padding:15px;
  border-radius:12px;
  background: rgba(255,255,255,0.1);
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
}

.card h3 {
  margin-bottom:10px;
  color:#5dade2;
}

.card p {
  margin:6px 0;
}

/* BUTTON */
button {
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#5dade2;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

button:hover {
  background:#3498db;
}

/* FILE INPUT */
input[type="file"] {
  margin-top:10px;
  color:white;
}

/* LIST */
ul {
  list-style:none;
  margin-top:10px;
}

li {
  background: rgba(255,255,255,0.1);
  padding:8px;
  border-radius:6px;
  margin-bottom:5px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .container { width:95%; }
}
</style>
</head>

<body>

<!-- BLOBS -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<header>
  <img src="logo.png">
  <h2>Mon Contrat</h2>
</header>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Contrat</a>
  <a href="paiement_locataire.html">Paiement</a>
  <a href="historique.html">Historique</a>
  <a href="profil_locataire.html">Profil</a>
</nav>

<div class="container">

  <!-- INFOS CONTRAT -->
  <div id="contratInfo"></div>

  <!-- TELECHARGER -->
  <div class="card">
    <h3>📄 Contrat</h3>
    <button onclick="telechargerContrat()">Télécharger</button>
  </div>

  <!-- AJOUT DOC -->
  <div class="card">
    <h3>📎 Ajouter document</h3>
    <input type="file" id="fileInput">
    <button onclick="ajouterDocument()">Ajouter</button>
  </div>

  <!-- LISTE DOC -->
  <div class="card">
    <h3>📥 Documents</h3>
    <ul id="listeDocs"></ul>
  </div>

</div>

<script>
// sécurité
if(localStorage.getItem("connecte") !== "true"){
  window.location.href="login.html";
}

// données
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let userId = localStorage.getItem("userId");
let locataire = locataires.find(l => l.id == userId);

// contrats test
if(!localStorage.getItem("contrats")){
  let contrats = [
    {id:1, locataireId:1, bien:"Appartement A", bailleur:"Mr Dupont", montant:500, dateDebut:"01/01/2026", dateFin:"31/12/2026"}
  ];
  localStorage.setItem("contrats", JSON.stringify(contrats));
}

let contrats = JSON.parse(localStorage.getItem("contrats"));
let contrat = contrats.find(c => c.locataireId == locataire?.id);

// afficher contrat
let contratDiv = document.getElementById("contratInfo");

if(contrat){
  contratDiv.innerHTML = `
    <div class="card">
      <h3>📋 Informations</h3>
      <p><strong>Bien:</strong> ${contrat.bien}</p>
      <p><strong>Bailleur:</strong> ${contrat.bailleur}</p>
      <p><strong>Montant:</strong> ${contrat.montant}$</p>
      <p><strong>Date début:</strong> ${contrat.dateDebut}</p>
      <p><strong>Date fin:</strong> ${contrat.dateFin}</p>
    </div>
  `;
}else{
  contratDiv.innerHTML = "<p>Aucun contrat trouvé.</p>";
}

// documents
let documents = JSON.parse(localStorage.getItem("documents")) || [];

function afficherDocs(){
  let ul = document.getElementById("listeDocs");
  ul.innerHTML = "";

  if(documents.length === 0){
    ul.innerHTML = "<p>Aucun document</p>";
    return;
  }

  documents.forEach(d => {
    ul.innerHTML += `<li>📄 ${d}</li>`;
  });
}

function ajouterDocument(){
  let file = document.getElementById("fileInput").files[0];

  if(!file){
    alert("Choisir un fichier !");
    return;
  }

  documents.push(file.name);
  localStorage.setItem("documents", JSON.stringify(documents));

  afficherDocs();
}

function telechargerContrat(){
  alert("Téléchargement du contrat...");
}

afficherDocs();
</script>

</body>
</html>
