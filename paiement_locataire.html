<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg, #3498db, #5dade2);
}

/* HEADER */
header {
  display:flex;
  align-items:center;
  padding:15px;
  background:white;
}

header img { height:50px; margin-right:10px; }

/* NAV */
nav {
  text-align:center;
  background:#fff;
  padding:10px;
}

nav a {
  margin:0 10px;
  text-decoration:none;
  color:#2980b9;
}

/* CONTAINER */
.container {
  max-width:400px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* BUTTON */
button {
  background:#2980b9;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#3498db;
}

/* RESULT */
.result {
  background:#ecf0f1;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h2>Paiement</h2>
</header>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Contrat</a>
  <a href="historique.html">Historique</a>
</nav>

<div class="container">

  <h3>💳 Effectuer un paiement</h3>

  <!-- Montant -->
  <input type="number" id="montant" placeholder="Montant">

  <!-- Devise -->
  <select id="devise" onchange="convertir()">
    <option value="USD">Dollar ($)</option>
    <option value="CDF">Franc Congolais (FC)</option>
  </select>

  <!-- Taux -->
  <input type="number" id="taux" placeholder="Taux (ex: 2500 FC = 1$)" value="2500" onchange="convertir()">

  <!-- Résultat -->
  <div class="result" id="conversion">Montant en USD : 0 $</div>

  <!-- Moyen paiement -->
  <select id="moyen">
    <option value="Banque">🏦 Banque</option>
    <option value="Orange Money">📱 Orange Money</option>
    <option value="M-Pesa">📱 M-Pesa</option>
    <option value="Cash">💵 Cash</option>
  </select>

  <button onclick="payer()">Payer</button>

  <p id="message"></p>

</div>

<script>
// sécurité
if(localStorage.getItem("connecte") !== "true"){
  window.location.href="login.html";
}

// données
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let userId = localStorage.getItem("userId");
let locataire = locataires.find(l => l.id == userId);

// stockage
let paiements = JSON.parse(localStorage.getItem("paiements")) || [];

// conversion
function convertir(){
  let montant = parseFloat(document.getElementById("montant").value) || 0;
  let devise = document.getElementById("devise").value;
  let taux = parseFloat(document.getElementById("taux").value) || 1;

  let usd = 0;

  if(devise === "CDF"){
    usd = montant / taux;
  } else {
    usd = montant;
  }

  document.getElementById("conversion").innerText =
    "Montant en USD : " + usd.toFixed(2) + " $";
}

// paiement
function payer(){
  let montant = parseFloat(document.getElementById("montant").value);
  let devise = document.getElementById("devise").value;
  let taux = parseFloat(document.getElementById("taux").value);
  let moyen = document.getElementById("moyen").value;

  if(!montant){
    alert("Entrer un montant");
    return;
  }

  let montantUSD = devise === "CDF" ? montant / taux : montant;

  let paiement = {
    id: paiements.length + 1,
    locataireId: locataire.id,
    montant: montant,
    devise: devise,
    montantUSD: montantUSD,
    moyen: moyen,
    date: new Date().toLocaleString(),
    statut: "Payé"
  };

  paiements.push(paiement);
  localStorage.setItem("paiements", JSON.stringify(paiements));

  document.getElementById("message").innerText =
    "✅ Paiement réussi via " + moyen + " (" + montantUSD.toFixed(2) + "$)";

  document.getElementById("montant").value = "";
  document.getElementById("conversion").innerText = "Montant en USD : 0 $";
}
</script>

</body>
</html>
