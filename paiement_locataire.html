<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#2c3e50; color:white; padding:15px; text-align:center; }
nav a { margin-right:10px; text-decoration:none; color:#34495e; }
.container { width:300px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
input, button { width:100%; padding:10px; margin:10px 0; }
button { background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; }
#message { color:green; font-weight:bold; text-align:center; }
</style>
</head>
<body>

<header>
  <h2>Paiement</h2>
</header>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Mon contrat</a>
  <a href="paiement_locataire.html">Paiement</a>
  <a href="historique.html">Historique</a>
  <a href="profil_locataire.html">Profil</a>
</nav>

<div class="container">
    <input type="number" id="montant" placeholder="Montant à payer">
    <button onclick="payer()">Payer</button>
    <p id="message"></p>
</div>

<script src="init.js"></script>
<script>
// sécurité
if(localStorage.getItem("connecte") !== "true"){
    window.location.href="login.html";
}

// récupérer locataire
let locataires = JSON.parse(localStorage.getItem("locataires"));
let userId = localStorage.getItem("userId");
let locataire = locataires.find(l => l.id == userId);

// initialiser paiements
if(!localStorage.getItem("paiements")){
    localStorage.setItem("paiements", JSON.stringify([]));
}

let paiements = JSON.parse(localStorage.getItem("paiements"));

function payer(){
    let montant = document.getElementById("montant").value;
    if(!montant) return alert("Veuillez saisir un montant");

    let paiement = {
        id: paiements.length+1,
        locataireId: locataire.id,
        montant: parseFloat(montant),
        date: new Date().toLocaleDateString(),
        statut: "Payé"
    };

    paiements.push(paiement);
    localStorage.setItem("paiements", JSON.stringify(paiements));

    document.getElementById("message").innerText = "Paiement effectué !";
    document.getElementById("montant").value = "";
}
</script>
</body>
</html>
