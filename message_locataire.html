<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Messages - RentMaster</title>

<style>

/* --- BODY --- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background-image: url('fond3.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: #1b263b;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* --- HEADER --- */
.header {
    background: rgba(44, 62, 80, 0.9);
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    backdrop-filter: blur(5px);
}

/* --- NAV --- */
nav {
    display: flex;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    padding: 10px;
    border-bottom: 1px solid #ccc;
}
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #3498db;
    font-weight: bold;
}
nav a:hover {
    color: #2980b9;
}

/* --- CHAT CONTAINER --- */
#chatContainer {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

/* --- MESSAGE --- */
.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    margin: 8px 0;
    font-size: 14px;
    backdrop-filter: blur(3px);
}

/* PROPRIÉTAIRE */
.proprietaire {
    background: linear-gradient(135deg, #3498db, #5dade2);
    color: white;
    margin-left: auto;
}

/* LOCATAIRE */
.locataire {
    background: rgba(255,255,255,0.9);
    margin-right: auto;
}

/* INFO */
.info-msg {
    font-size: 11px;
    opacity: 0.8;
    margin-bottom: 3px;
}

/* DATE */
.date-msg {
    font-size: 10px;
    margin-top: 5px;
    text-align: right;
    opacity: 0.7;
}

/* --- FORM --- */
#formMessage {
    display: flex;
    padding: 10px;
    background: rgba(255,255,255,0.95);
    border-top: 1px solid #ccc;
}

#formMessage select,
#formMessage textarea {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-right: 5px;
}

#formMessage textarea {
    flex: 1;
    resize: none;
}

#formMessage button {
    padding: 8px 15px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #0F172A, #2563EB, #38BDF8);
    color: white;
    cursor: pointer;
}
#formMessage button:hover {
    opacity: 0.9;
}

/* SCROLL */
#chatContainer::-webkit-scrollbar {
    width: 6px;
}
#chatContainer::-webkit-scrollbar-thumb {
    background: #3498db;
    border-radius: 3px;
}

</style>
</head>

<body>

<div class="header">
💬 Messagerie RentMaster
</div>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Contrats</a>
  <a href="guide.html">Guide</a>
  <a href="notification_locataire.html">Notifications 🔔</a>
</nav>

<div id="chatContainer"></div>

<div id="formMessage">
  <select id="locataireSelect"></select>
  <textarea id="messageText" rows="2" placeholder="Écrire un message..."></textarea>
  <button onclick="envoyerMessage()">Envoyer</button>
</div>

<script>

// --- DATA ---
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let messages = JSON.parse(localStorage.getItem("messages")) || [];

const nomProprietaire = "Propriétaire";

// --- INIT LOCATAIRES TEST ---
if(locataires.length === 0){
  locataires = [
    {id: 1, nom: "Ketsia", prenom: "Divine"},
    {id: 2, nom: "Jean", prenom: "Paul"}
  ];
  localStorage.setItem("locataires", JSON.stringify(locataires));
}

// --- SELECT ---
const locSelect = document.getElementById('locataireSelect');
locataires.forEach(l => {
  locSelect.innerHTML += `<option value="${l.id}">${l.nom} ${l.prenom}</option>`;
});

// --- AFFICHER ---
function afficherMessages() {
  const container = document.getElementById('chatContainer');
  container.innerHTML = "";

  if(messages.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#888;">Aucun message</p>';
    return;
  }

  messages.forEach(m => {
    const div = document.createElement('div');
    div.classList.add('message');
    div.classList.add(m.deNom === nomProprietaire ? 'proprietaire' : 'locataire');

    div.innerHTML = `
      <div class="info-msg">
        ${m.deNom} → ${m.aNom}
      </div>
      ${m.text}
      <div class="date-msg">${m.date}</div>
    `;

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

// --- ENVOYER ---
function envoyerMessage() {
  const locId = locSelect.value;
  const texte = document.getElementById('messageText').value.trim();

  if(!locId || !texte){
    alert("Écris un message !");
    return;
  }

  const loc = locataires.find(l => l.id == locId);

  const newMessage = {
    deNom: nomProprietaire,
    aLocataireId: locId,
    aNom: loc.nom + " " + loc.prenom,
    text: texte,
    date: new Date().toLocaleString()
  };

  messages.push(newMessage);
  localStorage.setItem("messages", JSON.stringify(messages));

  document.getElementById('messageText').value = "";
  afficherMessages();
}

// --- INIT ---
afficherMessages();

</script>

</body>
</html>
