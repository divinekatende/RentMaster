<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Biens - RentMaster</title>
 <link rel="stylesheet" href="bien.css">
</head>
<body>
  
<h1>Gestion des Biens</h1>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="bien.html">Biens</a>
  <a href="locataire.html">Locataires</a>
  <a href="contrat.html">Contrats</a>
  <a href="paiement.html">Paiements</a>
</nav>

<label>Rechercher :</label>
<input type="text" id="searchInput" placeholder="Nom, Adresse, Statut" onkeyup="filtrerBiens()">
<button onclick="document.getElementById('formAjout').style.display='block'">+ Ajouter un bien</button>

<table id="tableBiens">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Adresse</th>
      <th>Type</th>
      <th>Surface (m²)</th>
      <th>Pièces</th>
      <th>Loyer ($)</th>
      <th>Statut</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="formAjout">
  <h2 id="formTitle">Ajouter un bien</h2>
  <label>Nom :</label>
  <input type="text" id="nomBien"><br>
  <label>Adresse :</label>
  <input type="text" id="adresseBien"><br>
  <label>Type :</label>
  <select id="typeBien">
    <option value="Appartement">Appartement</option>
    <option value="Maison">Maison</option>
    <option value="Studio">Studio</option>
    <option value="Bureau">Bureau</option>
  </select><br>
  <label>Surface (m²) :</label>
  <input type="number" id="surfaceBien"><br>
  <label>Nombre de pièces :</label>
  <input type="number" id="piecesBien"><br>
  <label>Loyer :</label>
  <input type="number" id="loyerBien"><br>
  <label>Statut :</label>
  <select id="statutBien">
    <option value="Disponible">Disponible</option>
    <option value="Loué">Loué</option>
    <option value="Maintenance">Maintenance</option>
  </select><br>
  <label>Description / équipements :</label><br>
  <textarea id="descBien" rows="3" cols="50" placeholder="Ex: Balcon, piscine, parking"></textarea><br>
  <label>Image :</label>
  <input type="file" id="imageBien" accept="image/*"><br>
  <button id="btnAjouter" onclick="ajouterBien()">Ajouter</button>
  <button onclick="annulerForm()">Annuler</button>
</div>

<script>
let biens = JSON.parse(localStorage.getItem("biens")) || [];
let editIndex = -1;

function afficherBiens() {
  const table = document.querySelector('#tableBiens tbody');
  table.innerHTML = "";
  biens.forEach((bien, index) => {
    const row = table.insertRow();
    row.insertCell(0).innerText = bien.id;
    row.insertCell(1).innerHTML = bien.photos ? `<img src="${bien.photos[0]}"> ${bien.nom}` : bien.nom;
    row.insertCell(2).innerText = bien.adresse;
    row.insertCell(3).innerText = bien.type;
    row.insertCell(4).innerText = bien.surface;
    row.insertCell(5).innerText = bien.pieces;
    row.insertCell(6).innerText = bien.loyer;
    const statutCell = row.insertCell(7);
    statutCell.innerText = bien.statut;
    statutCell.className = bien.statut === "Disponible" ? "vacant" : bien.statut === "Loué" ? "loue" : "maintenance";
    const actionsCell = row.insertCell(8);
    actionsCell.innerHTML = `<button onclick="modifierBien(${index})">Modifier</button>
                             <button onclick="supprimerBien(${index})">Supprimer</button>`;
  });
}

function ajouterBien() {
  const nom = document.getElementById('nomBien').value;
  const adresse = document.getElementById('adresseBien').value;
  const type = document.getElementById('typeBien').value;
  const surface = document.getElementById('surfaceBien').value;
  const pieces = document.getElementById('piecesBien').value;
  const loyer = document.getElementById('loyerBien').value;
  const statut = document.getElementById('statutBien').value;
  const desc = document.getElementById('descBien').value;
  const file = document.getElementById('imageBien').files[0];

  if(!nom || !adresse || !surface || !pieces || !loyer) { alert("Remplis tous les champs obligatoires !"); return; }

  const ajouterOuModifier = (imgData) => {
    if(editIndex >= 0) {
      biens[editIndex] = {...biens[editIndex], nom, adresse, type, surface, pieces, loyer, statut, description: desc, photos: imgData ? [imgData] : biens[editIndex].photos};
      editIndex = -1;
    } else {
      const newBien = { id: biens.length + 1, nom, adresse, type, surface, pieces, loyer, statut, description: desc, photos: imgData ? [imgData] : [] };
      biens.push(newBien);
    }
    localStorage.setItem("biens", JSON.stringify(biens));
    afficherBiens();
    annulerForm();
  }

  if(file){
    const reader = new FileReader();
    reader.onload = e => ajouterOuModifier(e.target.result);
    reader.readAsDataURL(file);
  } else {
    ajouterOuModifier();
  }
}

function modifierBien(index) {
  editIndex = index;
  const bien = biens[index];
  document.getElementById('nomBien').value = bien.nom;
  document.getElementById('adresseBien').value = bien.adresse;
  document.getElementById('typeBien').value = bien.type;
  document.getElementById('surfaceBien').value = bien.surface;
  document.getElementById('piecesBien').value = bien.pieces;
  document.getElementById('loyerBien').value = bien.loyer;
  document.getElementById('statutBien').value = bien.statut;
  document.getElementById('descBien').value = bien.description || '';
  document.getElementById('formTitle').innerText = "Modifier un bien";
  document.getElementById('btnAjouter').innerText = "Enregistrer";
  document.getElementById('formAjout').style.display='block';
}

function supprimerBien(index) {
  if(confirm("Voulez-vous vraiment supprimer ce bien ?")) {
    biens.splice(index,1);
    localStorage.setItem("biens", JSON.stringify(biens));
    afficherBiens();
  }
}

function annulerForm() {
  document.getElementById('formAjout').style.display='none';
  document.getElementById('nomBien').value='';
  document.getElementById('adresseBien').value='';
  document.getElementById('typeBien').value='Appartement';
  document.getElementById('surfaceBien').value='';
  document.getElementById('piecesBien').value='';
  document.getElementById('loyerBien').value='';
  document.getElementById('statutBien').value='Disponible';
  document.getElementById('descBien').value='';
  document.getElementById('imageBien').value='';
  editIndex=-1;
  document.getElementById('btnAjouter').innerText="Ajouter";
  document.getElementById('formTitle').innerText="Ajouter un bien";
}

function filtrerBiens() {
  const filtre = document.getElementById('searchInput').value.toLowerCase();
  const table = document.querySelector('#tableBiens tbody');
  table.innerHTML = "";
  biens.forEach((bien, index) => {
    if(bien.nom.toLowerCase().includes(filtre) || bien.adresse.toLowerCase().includes(filtre) || bien.statut.toLowerCase().includes(filtre)) {
      const row = table.insertRow();
      row.insertCell(0).innerText = bien.id;
      row.insertCell(1).innerHTML = bien.photos ? `<img src="${bien.photos[0]}"> ${bien.nom}` : bien.nom;
      row.insertCell(2).innerText = bien.adresse;
      row.insertCell(3).innerText = bien.type;
      row.insertCell(4).innerText = bien.surface;
      row.insertCell(5).innerText = bien.pieces;
      row.insertCell(6).innerText = bien.loyer;
      const statutCell = row.insertCell(7);
      statutCell.innerText = bien.statut;
      statutCell.className = bien.statut === "Disponible" ? "vacant" : bien.statut === "Loué" ? "loue" : "maintenance";
      const actionsCell = row.insertCell(8);
      actionsCell.innerHTML = `<button onclick="modifierBien(${index})">Modifier</button>
                               <button onclick="supprimerBien(${index})">Supprimer</button>`;
    }
  });
}

afficherBiens();
</script>
</body>
</html>
