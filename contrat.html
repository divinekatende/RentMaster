<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Contrats - RentMaster</title>
<link rel="stylesheet" href="bien.css">
</head>
<body>
<h1>Gestion des Contrats</h1>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="bien.html">Biens</a>
  <a href="locataire.html">Locataires</a>
  <a href="contrat.html">Contrats</a>
  <a href="paiement.html">Paiements</a>
</nav>

<button onclick="document.getElementById('formAjout').style.display='block'">+ Ajouter un contrat</button>

<table id="tableContrats">
  <thead>
    <tr>
      <th>ID</th>
      <th>Bien</th>
      <th>Locataire</th>
      <th>Loyer</th>
      <th>Charges</th>
      <th>Date début</th>
      <th>Date fin</th>
      <th>Statut</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="formAjout">
  <h2 id="formTitle">Ajouter un contrat</h2>
  <label>Bien :</label>
  <select id="bienSelect"></select><br>
  <label>Locataire :</label>
  <select id="locataireSelect"></select><br>
  <label>Loyer :</label>
  <input type="number" id="loyer" min="0"><br>

  <h3>Charges</h3>
  <label>Eau :</label>
  <input type="number" id="eau" min="0" placeholder="0"><br>
  <label>Électricité :</label>
  <input type="number" id="electricite" min="0" placeholder="0"><br>
  <label>Internet :</label>
  <input type="number" id="internet" min="0" placeholder="0"><br>

  <label>Date début :</label>
  <input type="date" id="dateDebut"><br>
  <label>Date fin :</label>
  <input type="date" id="dateFin"><br>
  <label>Statut :</label>
  <select id="statut">
    <option value="Actif">Actif</option>
    <option value="Terminé">Terminé</option>
  </select><br>
  <button id="btnAjouter" onclick="ajouterContrat()">Ajouter</button>
  <button onclick="annulerForm()">Annuler</button>
</div>

<footer>
  <p>&copy; 2026 RentMaster. Tous droits réservés.</p>
  <p>
    Contact : <a href="mailto:divinekatende23@gmail.com">divinekatende23@gmail.com</a> | 
    Portfolio : <a href="https://divinekatende.github.io/DIVKT/" target="_blank">Mon Portfolio</a>
  </p>
</footer>

<script>
let biens = JSON.parse(localStorage.getItem("biens")) || [];
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let contrats = JSON.parse(localStorage.getItem("contrats")) || [];
let editIndex = -1;

function remplirSelects() {
  const bienSelect = document.getElementById('bienSelect');
  const locSelect = document.getElementById('locataireSelect');
  bienSelect.innerHTML = "";
  locSelect.innerHTML = "";
  biens.forEach(b => { bienSelect.innerHTML += `<option value="${b.id}">${b.nom}</option>`; });
  locataires.forEach(l => { locSelect.innerHTML += `<option value="${l.id}">${l.nom} ${l.prenom}</option>`; });
}

function afficherContrats() {
  remplirSelects();
  const table = document.querySelector('#tableContrats tbody');
  table.innerHTML = "";
  contrats.forEach((c, index) => {
    const row = table.insertRow();
    const bien = biens.find(b => b.id == c.bienId)?.nom || "Supprimé";
    const locObj = locataires.find(l => l.id == c.locataireId);
    const loc = locObj ? locObj.nom + " " + locObj.prenom : "Supprimé";
    const charges = `Eau:${c.charges?.eau || 0} $ - Élec:${c.charges?.electricite || 0} $ - Internet:${c.charges?.internet || 0} $`;

    row.insertCell(0).innerText = c.id;
    row.insertCell(1).innerText = bien;
    row.insertCell(2).innerText = loc;
    row.insertCell(3).innerText = c.loyer;
    row.insertCell(4).innerText = charges;
    row.insertCell(5).innerText = c.dateDebut;
    row.insertCell(6).innerText = c.dateFin;
    row.insertCell(7).innerText = c.statut;
    const actionsCell = row.insertCell(8);
    actionsCell.innerHTML = `<button onclick="modifierContrat(${index})">Modifier</button>
                             <button onclick="supprimerContrat(${index})">Supprimer</button>`;
  });
}

function ajouterContrat() {
  const bienId = document.getElementById('bienSelect').value;
  const locId = document.getElementById('locataireSelect').value;
  const loyer = document.getElementById('loyer').value;
  const dateDebut = document.getElementById('dateDebut').value;
  const dateFin = document.getElementById('dateFin').value;
  const statut = document.getElementById('statut').value;
  const eau = document.getElementById('eau').value || 0;
  const electricite = document.getElementById('electricite').value || 0;
  const internet = document.getElementById('internet').value || 0;

  if(!bienId || !locId || !loyer || !dateDebut || !dateFin) { alert("Remplis tous les champs !"); return; }

  const newContrat = { id: contrats.length + 1, bienId, locataireId: locId, loyer, dateDebut, dateFin, statut, charges:{eau, electricite, internet} };

  if(editIndex >= 0) {
    contrats[editIndex] = { ...contrats[editIndex], ...newContrat };
    editIndex = -1;
  } else {
    contrats.push(newContrat);
  }
  localStorage.setItem("contrats", JSON.stringify(contrats));
  afficherContrats();
  annulerForm();
}

function modifierContrat(index) {
  editIndex = index;
  const c = contrats[index];
  document.getElementById('bienSelect').value = c.bienId;
  document.getElementById('locataireSelect').value = c.locataireId;
  document.getElementById('loyer').value = c.loyer;
  document.getElementById('dateDebut').value = c.dateDebut;
  document.getElementById('dateFin').value = c.dateFin;
  document.getElementById('statut').value = c.statut;
  document.getElementById('eau').value = c.charges?.eau || 0;
  document.getElementById('electricite').value = c.charges?.electricite || 0;
  document.getElementById('internet').value = c.charges?.internet || 0;
  document.getElementById('formTitle').innerText = "Modifier un contrat";
  document.getElementById('btnAjouter').innerText = "Enregistrer";
  document.getElementById('formAjout').style.display='block';
}

function supprimerContrat(index) {
  if(confirm("Voulez-vous vraiment supprimer ce contrat ?")) {
    contrats.splice(index,1);
    localStorage.setItem("contrats", JSON.stringify(contrats));
    afficherContrats();
  }
}

function annulerForm() {
  document.getElementById('formAjout').style.display='none';
  document.getElementById('loyer').value='';
  document.getElementById('dateDebut').value='';
  document.getElementById('dateFin').value='';
  document.getElementById('eau').value='';
  document.getElementById('electricite').value='';
  document.getElementById('internet').value='';
  editIndex=-1;
  document.getElementById('btnAjouter').innerText="Ajouter";
  document.getElementById('formTitle').innerText="Ajouter un contrat";
}

afficherContrats();
</script>
</body>
</html>
