<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - RentMaster</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Pour graphiques -->
  <style>
    body { font-family: Arial; margin: 20px; }
    nav a { margin-right: 10px; text-decoration: none; color: blue; }
    .stats { display: flex; gap: 20px; margin-top: 20px; }
    .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 200px; text-align: center; }
    .card h3 { margin: 5px 0; }
    button { padding: 5px 10px; margin: 5px 0; }
    .notifications { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #000; padding: 5px; text-align: left; }
    th { background-color: #f2f2f2; }
    select { padding: 5px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>

  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="bien.html">Biens</a>
    <a href="locataire.html">Locataires</a>
    <a href="contrat.html">Contrats</a>
    <a href="paiement.html">Paiement</a>
    <a href="profil.html">Profil</a>
  </nav>

 

  <!-- Statistiques rapides -->
  <div class="stats">
    <div class="card" id="cardBiens">
      <h3>Biens</h3>
      <p id="nbBiens">0</p>
      <button onclick="window.location='bien.html'">Voir détails</button>
    </div>
    <div class="card" id="cardLocataires">
      <h3>Locataires</h3>
      <p id="nbLocataires">0</p>
      <button onclick="window.location='locataire.html'">Voir détails</button>
    </div>
    <div class="card" id="cardContrats">
      <h3>Contrats actifs</h3>
      <p id="nbContrats">0</p>
      <button onclick="window.location='contrat.html'">Voir détails</button>
    </div>
    <div class="card" id="cardPaiements">
      <h3>Paiements en retard</h3>
      <p id="nbPaiements">0</p>
      <button onclick="window.location='paiement.html'">Voir détails</button>
    </div>
  </div>

  <!-- Graphiques -->
  <h2>Revenus par mois</h2>
  <canvas id="revenusChart" width="400" height="150"></canvas>

  <h2>Taux d’occupation</h2>
  <canvas id="occupationChart" width="400" height="150"></canvas>

  <!-- Notifications récentes -->
  <div class="notifications">
    <h2>Dernières actions</h2>
    <table>
      <thead>
        <tr><th>Action</th><th>Date</th></tr>
      </thead>
      <tbody id="tableNotifications">
        <!-- Notifications remplies par JS -->
      </tbody>
    </table>
  </div>

  <!-- Boutons rapides -->
  <div class="actions-rapides">
    <button onclick="window.location='dashboard.html#formAjoutBien'">+ Ajouter un bien</button>
    <button onclick="window.location='dashboard.html#formAjoutLoc'">+ Ajouter un locataire</button>
    <button onclick="window.location='contrat.html'">+ Créer un contrat</button>
    <button onclick="window.location='paiement.html'">+ Effectuer un paiement</button>
  </div>

  <script>
    // --- Fonctions pour statistiques ---
    function afficherStats() {
      const biens = JSON.parse(localStorage.getItem("biens")) || [];
      const locataires = JSON.parse(localStorage.getItem("locataires")) || [];
      const contrats = JSON.parse(localStorage.getItem("contrats")) || [];
      const paiements = JSON.parse(localStorage.getItem("paiements")) || [];

      document.getElementById('nbBiens').innerText = biens.length;
      document.getElementById('nbLocataires').innerText = locataires.length;
      document.getElementById('nbContrats').innerText = contrats.length;

      // Paiements en retard = montant > 0 et date dépassée
      let retard = paiements.filter(p => {
        const today = new Date();
        const datePaiement = new Date(p.date);
        return today > datePaiement && p.montant < 0;
      });
      document.getElementById('nbPaiements').innerText = retard.length;
    }

    // --- Notifications ---
    function afficherNotifications() {
      const locataires = JSON.parse(localStorage.getItem("locataires")) || [];
      const paiements = JSON.parse(localStorage.getItem("paiements")) || [];
      const tbody = document.getElementById('tableNotifications');
      tbody.innerHTML = "";

      // Derniers locataires ajoutés
      locataires.slice(-3).forEach(l => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = "Nouveau locataire : " + l.nom;
        row.insertCell(1).innerText = new Date().toLocaleDateString();
      });

      // Derniers paiements
      paiements.slice(-3).forEach(p => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = "Paiement : " + p.contrat + " - " + p.montant + "$";
        row.insertCell(1).innerText = p.date;
      });
    }

    // --- Graphiques ---
    function afficherGraphiques() {
      const contrats = JSON.parse(localStorage.getItem("contrats")) || [];
      const paiements = JSON.parse(localStorage.getItem("paiements")) || [];

      // Revenus par mois
      const labels = ["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];
      const revenus = Array(12).fill(0);
      paiements.forEach(p => {
        const date = new Date(p.date);
        revenus[date.getMonth()] += parseFloat(p.montant);
      });

      new Chart(document.getElementById('revenusChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Revenus $',
            data: revenus,
            backgroundColor: 'rgba(54, 162, 235, 0.5)'
          }]
        }
      });

      // Taux d'occupation
      const biens = JSON.parse(localStorage.getItem("biens")) || [];
      const occupes = contrats.length;
      const libres = biens.length - occupes;
      new Chart(document.getElementById('occupationChart'), {
        type: 'doughnut',
        data: {
          labels: ['Occupés','Vacants'],
          datasets: [{
            data: [occupes, libres],
            backgroundColor: ['#36A2EB','#FFCE56']
          }]
        }
      });
    }

    // --- Initialisation ---
    window.onload = function() {
      afficherStats();
      afficherNotifications();
      afficherGraphiques();
    }
  </script>
</body>
</html>
