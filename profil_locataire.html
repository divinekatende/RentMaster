<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil Utilisateur</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
.container { width:350px; margin:50px auto; background:white; padding:20px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:8px 0; }
button.save { background:green; color:white; border:none; border-radius:5px; cursor:pointer; }
button.logout { background:red; color:white; border:none; border-radius:5px; cursor:pointer; }
img { width:100px; border-radius:50%; display:block; margin:10px auto; }
h2 { text-align:center; }
</style>
</head>
<body>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Mon contrat</a>
  <a href="paiement_locataire.html">Paiement</a>
  <a href="historique.html">Historique</a>
  <a href="profil_locataire.html">Profil</a>
</nav>

<div class="container">
<h2>Profil Utilisateur</h2>

<img id="photo" src=""><br>
<input type="file" id="uploadPhoto">

<input type="text" id="nom" placeholder="Nom et Prénom">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="telephone" placeholder="Téléphone">
<input type="password" id="password" placeholder="Nouveau mot de passe">

<select id="role">
    <option value="utilisateur">Utilisateur</option>
    <option value="admin">Admin</option>
    <option value="agent">Agent</option>
    <option value="propriétaire">Propriétaire</option>
</select>

<p>Dernière connexion: <span id="lastLogin"></span></p>

<h3>Préférences</h3>
<label>
    <input type="checkbox" id="notif"> Recevoir notifications
</label>
<select id="theme">
    <option value="clair">Thème clair</option>
    <option value="sombre">Thème sombre</option>
</select>
<select id="langue">
    <option value="fr">Français</option>
    <option value="en">Anglais</option>
</select>

<button class="save" onclick="sauvegarder()">Sauvegarder</button>
<button class="logout" onclick="logout()">Déconnexion</button>
</div>

<script src="init.js"></script>
<script>
// sécurité
if(localStorage.getItem("connecte") !== "true"){
    window.location.href="login.html";
}

// récupérer locataire/utilisateur connecté
let utilisateurs = JSON.parse(localStorage.getItem("locataires")) || [];
let userId = localStorage.getItem("userId");
let index = utilisateurs.findIndex(u => u.id == userId);
let user = utilisateurs[index];

// afficher infos
document.getElementById("nom").value = user.nom || "";
document.getElementById("email").value = user.email || "";
document.getElementById("telephone").value = user.telephone || "";
if(user.photo) document.getElementById("photo").src = user.photo;
document.getElementById("role").value = user.role || "utilisateur";
document.getElementById("lastLogin").innerText = user.lastLogin || "Jamais";
document.getElementById("notif").checked = user.preferences?.notifications || false;
document.getElementById("theme").value = user.preferences?.theme || "clair";
document.getElementById("langue").value = user.preferences?.langue || "fr";

// sauvegarder modifications
function sauvegarder(){
    user.nom = document.getElementById("nom").value;
    user.email = document.getElementById("email").value;
    user.telephone = document.getElementById("telephone").value;
    let newPassword = document.getElementById("password").value;
    if(newPassword) user.password = newPassword; // pour plus tard: hasher le mdp

    user.role = document.getElementById("role").value;
    user.preferences = {
        notifications: document.getElementById("notif").checked,
        theme: document.getElementById("theme").value,
        langue: document.getElementById("langue").value
    };

    let file = document.getElementById("uploadPhoto").files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            user.photo = e.target.result;
            utilisateurs[index] = user;
            localStorage.setItem("locataires", JSON.stringify(utilisateurs));
            document.getElementById("photo").src = user.photo;
            alert("Profil mis à jour !");
        }
        reader.readAsDataURL(file);
    } else {
        utilisateurs[index] = user;
        localStorage.setItem("locataires", JSON.stringify(utilisateurs));
        alert("Profil mis à jour !");
    }
}

// déconnexion
function logout(){
    user.lastLogin = new Date().toLocaleString();
    utilisateurs[index] = user;
    localStorage.setItem("locataires", JSON.stringify(utilisateurs));
    localStorage.removeItem("connecte");
    localStorage.removeItem("userId");
    window.location.href = "login.html";
}
</script>
</body>
</html>
