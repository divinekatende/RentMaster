<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Notifications - RentMaster</title>

<style>

/* --- BODY --- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background-image: url('fond3.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: #1b263b;
}

/* --- HEADER --- */
.header {
    background: rgba(44, 62, 80, 0.9);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    backdrop-filter: blur(6px);
}

/* --- NAV --- */
nav {
    display: flex;
    justify-content: center;
    background: rgba(255,255,255,0.9);
    padding: 10px;
    border-bottom: 1px solid #ccc;
}
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #3498db;
    font-weight: bold;
}
nav a:hover {
    color: #2980b9;
}

/* --- CONTAINER --- */
.container {
    max-width: 700px;
    margin: 20px auto;
    padding: 10px;
}

/* --- NOTIFICATION CARD --- */
.notification {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(5px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.notification:hover {
    transform: translateY(-3px);
}

/* --- ICON --- */
.icon {
    font-size: 22px;
}

/* --- TYPES COULEURS --- */
.retard {
    border-left: 6px solid #e74c3c;
}
.valide {
    border-left: 6px solid #2ecc71;
}
.message {
    border-left: 6px solid #f39c12;
}

/* --- TEXT --- */
.text {
    flex: 1;
    font-size: 14px;
}

.text strong {
    display: block;
    margin-bottom: 5px;
    font-size: 15px;
}

/* --- DATE --- */
.date {
    font-size: 11px;
    color: #777;
    margin-top: 5px;
}

/* --- EMPTY --- */
.vide {
    text-align: center;
    color: #888;
    margin-top: 80px;
    font-size: 16px;
}

/* --- SCROLL --- */
.container::-webkit-scrollbar {
    width: 6px;
}
.container::-webkit-scrollbar-thumb {
    background: #3498db;
    border-radius: 3px;
}

/* --- RESPONSIVE --- */
@media(max-width: 700px){
    .container {
        margin: 10px;
    }
}

</style>
</head>

<body>

<div class="header">
🔔 Notifications RentMaster
</div>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Contrats</a>
  <a href="message_locataire.html">Messages 💬</a>
  <a href="guide.html">Guide</a>
</nav>

<div class="container" id="notifContainer"></div>

<script>

// --- SÉCURITÉ ---
if (localStorage.getItem("connecte") !== "true") {
    window.location.href = "login.html";
}

// --- DATA ---
let notifications = JSON.parse(localStorage.getItem("notifications")) || [];

// --- AFFICHAGE ---
function afficherNotifications() {
  const container = document.getElementById("notifContainer");
  container.innerHTML = "";

  if(notifications.length === 0){
    container.innerHTML = `<p class="vide">Aucune notification</p>`;
    return;
  }

  // plus récent en haut
  const reversed = [...notifications].reverse();

  reversed.forEach(n => {

    let icon = "🔔";

    if(n.type === "retard") icon = "⚠️";
    if(n.type === "valide") icon = "✅";
    if(n.type === "message") icon = "💬";

    const div = document.createElement("div");
    div.classList.add("notification", n.type);

    div.innerHTML = `
      <div class="icon">${icon}</div>

      <div class="text">
        <strong>${n.titre}</strong>
        ${n.message}
        <div class="date">${n.date}</div>
      </div>
    `;

    container.appendChild(div);
  });
}

// --- INIT ---
afficherNotifications();

</script>

</body>
</html>
