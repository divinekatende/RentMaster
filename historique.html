<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Historique des paiements</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    background: linear-gradient(135deg, #3498db, #5dade2);
    color:#1b263b;
}
header {
    display:flex;
    align-items:center;
    padding:15px 20px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    border-bottom:2px solid #2980b9;
}
header img { height:50px; margin-right:15px; }
header h2 { margin:0; }
nav {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    background: rgba(255,255,255,0.85);
    padding:10px 0;
    border-bottom:2px solid #2980b9;
}
nav a {
    margin:5px 10px;
    text-decoration:none;
    color:#1b263b;
    font-weight:500;
    padding:5px 10px;
    border-radius:6px;
    transition:0.3s;
}
nav a:hover { background: #d3e6f6; }

.container {
    width:90%;
    max-width:400px;
    margin:20px auto;
    background: rgba(255,255,255,0.9);
    padding:20px;
    border-radius:10px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}
.card {
    padding:15px;
    border-radius:10px;
    background:#ecf0f1;
    margin-bottom:10px;
}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Logo">
  <h2>Historique Paiements</h2>
</header>

<nav>
  <a href="dashboard_locataire.html">Dashboard</a>
  <a href="contrat_locataire.html">Mon contrat</a>
  <a href="paiement_locataire.html">Paiement</a>
  <a href="historique.html">Historique</a>
  <a href="profil_locataire.html">Profil</a>
</nav>

<div class="container" id="historiqueContainer"></div>

<script src="init.js"></script>
<script>
if(localStorage.getItem("connecte") !== "true"){ window.location.href="login.html"; }
let locataires = JSON.parse(localStorage.getItem("locataires"));
let userId = localStorage.getItem("userId");
let locataire = locataires.find(l => l.id == userId);

let paiements = JSON.parse(localStorage.getItem("paiements")) || [];
let userPaiements = paiements.filter(p => p.locataireId == locataire.id);

let container = document.getElementById("historiqueContainer");
if(userPaiements.length === 0){
    container.innerHTML = "<p>Aucun paiement enregistré.</p>";
} else {
    userPaiements.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <p><strong>Montant:</strong> ${p.montant}$</p>
                <p><strong>Date:</strong> ${p.date}</p>
                <p><strong>Statut:</strong> ${p.statut}</p>
            </div>`;
    });
}
</script>

</body>
</html>
