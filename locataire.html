<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Locataires - RentMaster</title>
<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
nav a { margin-right: 10px; text-decoration: none; color: blue; }
input, select { padding: 5px; margin: 5px 0; width: 200px; }
button { padding: 5px 10px; margin: 5px 0; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #000; padding: 8px; text-align: left; }
th { background-color: #f2f2f2; }
#formAjout { display: none; margin-top: 20px; border:1px solid #ccc; padding:10px; border-radius:8px; background:white; }
</style>
</head>
<body>
<h1>Gestion des Locataires</h1>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="bien.html">Biens</a>
  <a href="locataire.html">Locataires</a>
  <a href="contrat.html">Contrats</a>
  <a href="paiement.html">Paiements</a>
</nav>

<label>Rechercher :</label>
<input type="text" id="searchInput" placeholder="Nom, Email, Téléphone" onkeyup="filtrerLocataires()">
<button onclick="document.getElementById('formAjout').style.display='block'">+ Ajouter un locataire</button>

<table id="tableLocataires">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom complet</th>
      <th>Date de naissance</th>
      <th>Email</th>
      <th>Téléphone</th>
      <th>Adresse</th>
      <th>Profession</th>
      <th>Pièce d'identité</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="formAjout">
  <h2 id="formTitle">Ajouter un locataire</h2>
  <label>Nom :</label>
  <input type="text" id="nomLocataire"><br>
  <label>Prénom :</label>
  <input type="text" id="prenomLocataire"><br>
  <label>Date de naissance :</label>
  <input type="date" id="dobLocataire"><br>
  <label>Email :</label>
  <input type="email" id="emailLocataire"><br>
  <label>Téléphone :</label>
  <input type="text" id="telLocataire"><br>
  <label>Adresse :</label>
  <input type="text" id="adresseLocataire"><br>
  <label>Profession :</label>
  <input type="text" id="professionLocataire"><br>
  <label>Pièce d'identité :</label>
  <input type="file" id="idPiece" accept="image/*,application/pdf"><br>
  <button id="btnAjouter" onclick="ajouterLocataire()">Ajouter</button>
  <button onclick="annulerForm()">Annuler</button>
</div>

<script>
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let editIndex = -1;

function afficherLocataires() {
  const table = document.querySelector('#tableLocataires tbody');
  table.innerHTML = "";
  locataires.forEach((locataire, index) => {
    const row = table.insertRow();
    row.insertCell(0).innerText = locataire.id;
    row.insertCell(1).innerText = locataire.nom + " " + locataire.prenom;
    row.insertCell(2).innerText = locataire.dob;
    row.insertCell(3).innerText = locataire.email;
    row.insertCell(4).innerText = locataire.tel;
    row.insertCell(5).innerText = locataire.adresse;
    row.insertCell(6).innerText = locataire.profession;
    row.insertCell(7).innerHTML = locataire.idPiece ? `<a href="${locataire.idPiece}" target="_blank">Voir</a>` : "";
    const actionsCell = row.insertCell(8);
    actionsCell.innerHTML = `<button onclick="modifierLocataire(${index})">Modifier</button>
                             <button onclick="supprimerLocataire(${index})">Supprimer</button>`;
  });
}

function ajouterLocataire() {
  const nom = document.getElementById('nomLocataire').value;
  const prenom = document.getElementById('prenomLocataire').value;
  const dob = document.getElementById('dobLocataire').value;
  const email = document.getElementById('emailLocataire').value;
  const tel = document.getElementById('telLocataire').value;
  const adresse = document.getElementById('adresseLocataire').value;
  const profession = document.getElementById('professionLocataire').value;
  const file = document.getElementById('idPiece').files[0];

  if(!nom || !prenom || !dob || !email || !tel) { alert("Remplis tous les champs obligatoires !"); return; }

  const ajouterOuModifier = (fileData) => {
    if(editIndex >= 0) {
      locataires[editIndex] = {...locataires[editIndex], nom, prenom, dob, email, tel, adresse, profession, idPiece: fileData ? fileData : locataires[editIndex].idPiece};
      editIndex = -1;
    } else {
      const newLocataire = { id: locataires.length + 1, nom, prenom, dob, email, tel, adresse, profession, idPiece: fileData ? fileData : "" };
      locataires.push(newLocataire);
    }
    localStorage.setItem("locataires", JSON.stringify(locataires));
    afficherLocataires();
    annulerForm();
  }

  if(file){
    const reader = new FileReader();
    reader.onload = e => ajouterOuModifier(e.target.result);
    reader.readAsDataURL(file);
  } else {
    ajouterOuModifier();
  }
}

function modifierLocataire(index) {
  editIndex = index;
  const locataire = locataires[index];
  document.getElementById('nomLocataire').value = locataire.nom;
  document.getElementById('prenomLocataire').value = locataire.prenom;
  document.getElementById('dobLocataire').value = locataire.dob;
  document.getElementById('emailLocataire').value = locataire.email;
  document.getElementById('telLocataire').value = locataire.tel;
  document.getElementById('adresseLocataire').value = locataire.adresse;
  document.getElementById('professionLocataire').value = locataire.profession;
  document.getElementById('formTitle').innerText = "Modifier un locataire";
  document.getElementById('btnAjouter').innerText = "Enregistrer";
  document.getElementById('formAjout').style.display='block';
}

function supprimerLocataire(index) {
  if(confirm("Voulez-vous vraiment supprimer ce locataire ?")) {
    locataires.splice(index,1);
    localStorage.setItem("locataires", JSON.stringify(locataires));
    afficherLocataires();
  }
}

function annulerForm() {
  document.getElementById('formAjout').style.display='none';
  document.getElementById('nomLocataire').value='';
  document.getElementById('prenomLocataire').value='';
  document.getElementById('dobLocataire').value='';
  document.getElementById('emailLocataire').value='';
  document.getElementById('telLocataire').value='';
  document.getElementById('adresseLocataire').value='';
  document.getElementById('professionLocataire').value='';
  document.getElementById('idPiece').value='';
  editIndex=-1;
  document.getElementById('btnAjouter').innerText="Ajouter";
  document.getElementById('formTitle').innerText="Ajouter un locataire";
}

function filtrerLocataires() {
  const filtre = document.getElementById('searchInput').value.toLowerCase();
  const table = document.querySelector('#tableLocataires tbody');
  table.innerHTML = "";
  locataires.forEach((locataire, index) => {
    if(locataire.nom.toLowerCase().includes(filtre) || locataire.prenom.toLowerCase().includes(filtre) || locataire.email.toLowerCase().includes(filtre)) {
      const row = table.insertRow();
      row.insertCell(0).innerText = locataire.id;
      row.insertCell(1).innerText = locataire.nom + " " + locataire.prenom;
      row.insertCell(2).innerText = locataire.dob;
      row.insertCell(3).innerText = locataire.email;
      row.insertCell(4).innerText = locataire.tel;
      row.insertCell(5).innerText = locataire.adresse;
      row.insertCell(6).innerText = locataire.profession;
      row.insertCell(7).innerHTML = locataire.idPiece ? `<a href="${locataire.idPiece}" target="_blank">Voir</a>` : "";
      const actionsCell = row.insertCell(8);
      actionsCell.innerHTML = `<button onclick="modifierLocataire(${index})">Modifier</button>
                               <button onclick="supprimerLocataire(${index})">Supprimer</button>`;
    }
  });
}

afficherLocataires();
</script>
</body>
</html>
