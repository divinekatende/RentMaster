<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Locataires - RentMaster</title>
<link rel="stylesheet" href="bien.css">
</head>
<body>
<h1>Gestion des Locataires</h1>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="bien.html">Biens</a>
  <a href="locataire.html">Locataires</a>
  <a href="contrat.html">Contrats</a>
  <a href="paiement.html">Paiements</a>
</nav>

<label>Rechercher :</label>
<input type="text" id="searchInput" placeholder="Nom, Email, Téléphone" onkeyup="filtrerLocataires()">
<button onclick="openForm()">+ Ajouter un locataire</button>

<table id="tableLocataires">
<thead>
<tr>
<th>ID</th><th>Matricule</th><th>Nom complet</th><th>Date de naissance</th>
<th>Sexe</th><th>État civil</th><th>Nationalité</th><th>Email</th>
<th>Téléphone</th><th>Profession</th><th>Pièce</th><th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="formAjout" style="display:none;">
<h2 id="formTitle">Ajouter un locataire</h2>

<input type="text" id="matriculeLocataire" placeholder="Matricule"><br>
<input type="text" id="nomLocataire" placeholder="Nom"><br>
<input type="text" id="prenomLocataire" placeholder="Prénom"><br>
<input type="date" id="dobLocataire"><br>

<select id="sexeLocataire">
<option>Homme</option>
<option>Femme</option>
</select><br>

<select id="etatCivilLocataire">
<option>Célibataire</option>
<option>Marié(e)</option>
</select><br>

<input type="text" id="nationaliteLocataire" placeholder="Nationalité"><br>
<input type="email" id="emailLocataire" placeholder="Email"><br>
<input type="text" id="telLocataire" placeholder="Téléphone"><br>
<input type="text" id="professionLocataire" placeholder="Profession"><br>

<input type="file" id="idPiece"><br>
<div class="btn-group">
<button id="btnAjouter" onclick="ajouterLocataire()">Ajouter</button>
<button onclick="annulerForm()">Annuler</button>
</div>
</div>

<script>
let locataires = JSON.parse(localStorage.getItem("locataires")) || [];
let editIndex = -1;

function afficherLocataires() {
  const table = document.querySelector('#tableLocataires tbody');
  table.innerHTML = "";
  locataires.forEach((locataire, index) => {
    const row = table.insertRow();
    row.insertCell(0).innerText = locataire.id;
    row.insertCell(1).innerText = locataire.matricule;
    row.insertCell(2).innerText = locataire.nom + " " + locataire.prenom;
    row.insertCell(3).innerText = locataire.dob;
    row.insertCell(4).innerText = locataire.sexe;
    row.insertCell(5).innerText = locataire.etatCivil;
    row.insertCell(6).innerText = locataire.nationalite;
    row.insertCell(7).innerText = locataire.email;
    row.insertCell(8).innerText = locataire.tel;
    row.insertCell(9).innerText = locataire.profession;
    row.insertCell(10).innerHTML = locataire.idPiece ? `<a href="${locataire.idPiece}" target="_blank">Voir</a>` : "";

    const actionsCell = row.insertCell(11);
    actionsCell.innerHTML = `
      <button onclick="modifierLocataire(${index})">Modifier</button>
      <button onclick="supprimerLocataire(${index})">Supprimer</button>
    `;
  });
}

function ajouterLocataire() {
  const matricule = document.getElementById('matriculeLocataire').value;
  const nom = document.getElementById('nomLocataire').value;
  const prenom = document.getElementById('prenomLocataire').value;
  const dob = document.getElementById('dobLocataire').value;
  const email = document.getElementById('emailLocataire').value;
  const tel = document.getElementById('telLocataire').value;

  if(!matricule || !nom || !prenom || !dob || !email || !tel){
    alert("Remplis tous les champs !");
    return;
  }

  const newLocataire = {
    id: locataires.length + 1,
    matricule,
    nom,
    prenom,
    dob,
    email,
    tel,

    // 🔐 AJOUT
    motDePasse: "00000",
    premiereConnexion: true
  };

  locataires.push(newLocataire);
  localStorage.setItem("locataires", JSON.stringify(locataires));

  alert("Locataire ajouté ! Mot de passe : 12345");

  afficherLocataires();
  annulerForm();
}

function openForm(){
  const form = document.getElementById('formAjout');
  form.style.display = "block";
  form.scrollIntoView({ behavior: "smooth" });
}

function annulerForm(){
  document.getElementById('formAjout').style.display='none';
}

// 🔥 ouverture automatique depuis dashboard
window.onload = function(){
  afficherLocataires();

  if(window.location.hash === "#formAjout"){
    openForm();
  }
}
</script>
</body>
</html>
